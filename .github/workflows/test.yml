name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DAGGER_EXTRA_ARGS: --progress plain
    steps:
      - uses: actions/checkout@v5
      - name: Install dagger
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=0.20.3 BIN_DIR=/usr/local/bin sh
      - run: ./run.sh
      - run: ./tangle.sh
      - run: ./check-clean.sh
      - run: ./test-dind.sh
