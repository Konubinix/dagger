name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.20.3"
      - run: ./run.sh
      - run: ./tangle.sh
      - run: ./check-clean.sh
      - run: ./test.sh
